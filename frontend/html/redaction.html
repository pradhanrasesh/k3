<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rasesh COAs PDF Redaction – Redaction Studio</title>

  <!-- Main app styles -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Lucide icons (non-module) -->
  <script src="../app/lucide-offline.js" defer></script>

  <!-- PDF.js core (non-module) -->
  <script src="../pdfjs/pdf.js"></script>

  <!-- Layout + app bootstrap (module) -->
  <script type="module" src="../app/layout.js"></script>
</head>

<body data-theme="system" data-density="comfortable" data-page="redaction">
  <div id="alertContainer"></div>
  <div id="toastContainer" class="toast-container"></div>

  <!-- Header partial -->
  <header id="base-header"></header>

  <div class="workspace">
    <!-- Sidebar partial (full sidebar for redaction) -->
    <aside class="sidebar" id="base-sidebar"></aside>

    <!-- Thumbnail Sidebar -->
    <aside class="thumbnail-sidebar" id="thumbnailSidebar" style="display: flex;">
      <div class="thumbnail-header">
        <span class="thumbnail-title">Pages</span>
        <span class="thumbnail-count" id="thumbnailPageCount">0</span>
      </div>
      <div class="thumbnail-container" id="thumbnailContainer">
        <div class="thumbnail-placeholder">
          <i data-lucide="file-image"></i>
          <p>Upload a PDF to see thumbnails</p>
        </div>
      </div>
    </aside>

    <!-- Viewer panel (PDF preview lives here) -->
    <main class="viewer-panel">
      <div class="viewer-header">
        <div class="zoom-controls">
          <button id="btnToggleThumbnails" class="btn btn-small" data-tooltip="Toggle Thumbnails"><i data-lucide="panel-left-close"></i></button>
          <button id="btnZoomOut" class="btn btn-small"><i data-lucide="zoom-out"></i></button>
          <span id="zoomInfo">100%</span>
          <button id="btnZoomIn" class="btn btn-small"><i data-lucide="zoom-in"></i></button>
        </div>

        <div id="pageInfo">
          <input id="pageJumpInput" type="text" value="–" />
          <span id="pageTotalText">/ –</span>
        </div>

        <div class="viewer-actions">
          <button id="btnPrevPage" class="btn btn-small"><i data-lucide="chevron-left"></i></button>
          <button id="btnNextPage" class="btn btn-small"><i data-lucide="chevron-right"></i></button>
          <button id="searchToggle" class="btn btn-small"><i data-lucide="search"></i></button>
        </div>
      </div>

      <div id="floatingSearchBar" class="floating-search">
        <div class="search-inner">
          <i data-lucide="search"></i>
          <input id="searchInput" type="text" placeholder="Search..." />
          <button id="btnSearchPrev" class="btn btn-small"><i data-lucide="chevron-up"></i></button>
          <button id="btnSearchNext" class="btn btn-small"><i data-lucide="chevron-down"></i></button>
          <button id="btnSearchRedactAll" class="btn btn-small"><i data-lucide="eraser"></i></button>
          <button id="btnCloseSearch" class="btn btn-small btn-ghost"><i data-lucide="x"></i></button>
        </div>
        <div id="searchSuggestions" class="suggestions hidden"></div>
      </div>

      <div class="pdf-scroll-container">
        <!-- THIS is where PDF_Loader.js renders pages -->
        <div id="pdfPagesColumn" class="pdf-pages-column"></div>
      </div>
    </main>

    <!-- Tools + plugins partial -->
    <aside class="right-panel" id="base-tools"></aside>
  </div>

  <!-- Footer partial (loaded only for non-studio pages; redaction is studio, so footer stays empty) -->
  <footer id="base-footer"></footer>

  <!-- Optional: icon refresh if needed -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>
</html>
